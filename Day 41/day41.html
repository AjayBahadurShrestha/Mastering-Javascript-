<!DOCTYPE html>
<html>

<head>

    <title>Hospital Patient Management System</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f8fb;
            text-align:center;
            margin-top:20px;
        }

        .container{
            width:800px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px gray;
        }

        input,
        select,
        button{
            width:400px;
            padding:12px;
            margin:10px;
            font-size:15px;
        }

        button{
            background:#059669;
            color:white;
            border:none;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            text-align:left;
            font-size:18px;
        }

        .safe{
            color:green;
        }

        .warning{
            color:orange;
        }

        .danger{
            color:red;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>🏥 Hospital Patient Management System</h2>

    <input
        type="text"
        id="patient"
        placeholder="Patient Name">

    <br>

    <input
        type="number"
        id="age"
        placeholder="Patient Age">

    <br>

    <select id="department">

        <option value="">
            Select Department
        </option>

        <option value="general">
            General Medicine
        </option>

        <option value="cardiology">
            Cardiology
        </option>

        <option value="neurology">
            Neurology
        </option>

    </select>

    <br>

    <select id="treatment">

        <option value="">
            Select Treatment
        </option>

        <option value="consultation">
            Consultation
        </option>

        <option value="minor">
            Minor Surgery
        </option>

        <option value="major">
            Major Surgery
        </option>

    </select>

    <br>

    <select id="insurance">

        <option value="">
            Insurance Available?
        </option>

        <option value="yes">
            Yes
        </option>

        <option value="no">
            No
        </option>

    </select>

    <br>

    <select id="emergency">

        <option value="">
            Emergency Case?
        </option>

        <option value="yes">
            Yes
        </option>

        <option value="no">
            No
        </option>

    </select>

    <br>

    <button onclick="generateReport()">
        Generate Report
    </button>

    <div id="result"></div>

</div>

<script>

function generateReport(){

    var patient =
        document.getElementById("patient").value;

    var age =
        Number(document.getElementById("age").value);

    var department =
        document.getElementById("department").value;

    var treatment =
        document.getElementById("treatment").value;

    var insurance =
        document.getElementById("insurance").value;

    var emergency =
        document.getElementById("emergency").value;

    if(
        patient == "" ||
        age <= 0 ||
        department == "" ||
        treatment == "" ||
        insurance == "" ||
        emergency == ""
    ){

        document.getElementById("result").innerHTML =
            "Please fill all fields";

        return;
    }

    var departmentFee = 0;

    if(department == "general"){

        departmentFee = 2000;

    }
    else if(department == "cardiology"){

        departmentFee = 8000;

    }
    else{

        departmentFee = 12000;

    }

    var treatmentFee = 0;

    if(treatment == "consultation"){

        treatmentFee = 1000;

    }
    else if(treatment == "minor"){

        treatmentFee = 10000;

    }
    else{

        treatmentFee = 40000;

    }

    var totalBill =
        departmentFee +
        treatmentFee;

    if(emergency == "yes"){

        totalBill =
            totalBill + 5000;

    }

    var discount = 0;

    if(insurance == "yes"){

        discount =
            totalBill * 0.20;

    }

    var finalBill =
        totalBill - discount;

    var riskLevel = "";
    var riskClass = "";

    if(age >= 70){

        riskLevel = "High Risk Patient";
        riskClass = "danger";

    }
    else if(age >= 50){

        riskLevel = "Medium Risk Patient";
        riskClass = "warning";

    }
    else{

        riskLevel = "Normal Risk";
        riskClass = "safe";

    }

    var priority = "";

    if(emergency == "yes"){

        priority = "Immediate Treatment";

    }
    else{

        priority = "Regular Queue";

    }

    document.getElementById("result").innerHTML =

        "<h3>Patient Report</h3>" +

        "Patient Name: " +
        patient + "<br><br>" +

        "Age: " +
        age + "<br><br>" +

        "Department: " +
        department + "<br><br>" +

        "Treatment: " +
        treatment + "<br><br>" +

        "<span class='" + riskClass + "'>" +
        riskLevel +
        "</span><br><br>" +

        "Priority Status: " +
        priority + "<br><br>" +

        "Hospital Charges: Rs. " +
        totalBill + "<br><br>" +

        "Insurance Discount: Rs. " +
        discount.toFixed(2) + "<br><br>" +

        "<strong>Final Bill: Rs. " +
        finalBill.toFixed(2) +
        "</strong>";

}

</script>

</body>
</html>
