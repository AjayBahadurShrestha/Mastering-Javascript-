<!DOCTYPE html>
<html lang="en">
<head>

  <title>Day 8</title>
</head>
<body>
  <script>
    function greet(name){
      if (!name){
        console.log('Hi there!')
      }
      else{
        console.log(`Hello ${name}!`)
      }
      
    }

    greet('Ajay')
    greet('Simon')
    greet('Punam')
    greet()
  </script>
</body>
</html>
