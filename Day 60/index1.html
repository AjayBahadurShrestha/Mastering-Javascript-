<!DOCTYPE html>
<html>
<head>

    <title>Real Estate Property Management</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f9;
            text-align:center;
        }

        .container{
            width:900px;
            margin:auto;
            margin-top:30px;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input,
        select,
        button{
            width:350px;
            padding:10px;
            margin:10px;
        }

        button{
            background:#0f766e;
            color:white;
            border:none;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            text-align:left;
            font-size:17px;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>🏘️ Real Estate Property Management System</h2>

    <input
        type="text"
        id="owner"
        placeholder="Property Owner">

    <br>

    <select id="propertyType">

        <option value="">
            Select Property Type
        </option>

        <option value="House">
            House
        </option>

        <option value="Apartment">
            Apartment
        </option>

        <option value="Commercial">
            Commercial
        </option>

    </select>

    <br>

    <input
        type="number"
        id="area"
        placeholder="Area (sq ft)">

    <br>

    <input
        type="number"
        id="pricePerSqft"
        placeholder="Price Per Sq Ft">

    <br>

    <input
        type="number"
        id="years"
        placeholder="Property Age (Years)">

    <br>

    <button onclick="generatePropertyReport()">
        Generate Report
    </button>

    <div id="result"></div>

</div>

<script>

class Property{

    constructor(owner,type,area,pricePerSqft,years){

        this.owner = owner;
        this.type = type;
        this.area = area;
        this.pricePerSqft = pricePerSqft;
        this.years = years;

    }

    getPropertyValue(){

        return this.area *
               this.pricePerSqft;

    }

    getAgentCommission(){

        return this.getPropertyValue() * 0.02;

    }

    getDepreciation(){

        return this.years * 1;

    }

    getInvestmentGrade(){

        var value =
            this.getPropertyValue();

        if(value >= 10000000){

            return "Premium";

        }
        else if(value >= 5000000){

            return "Good";

        }
        else{

            return "Standard";

        }

    }

    getPropertyStatus(){

        if(this.years <= 5){

            return "New Property";

        }
        else if(this.years <= 15){

            return "Well Maintained";

        }
        else{

            return "Old Property";

        }

    }

    getEstimatedValue(){

        var depreciation =
            this.getPropertyValue() *
            (this.getDepreciation() / 100);

        return this.getPropertyValue() -
               depreciation;

    }

}

function generatePropertyReport(){

    var owner =
        document.getElementById("owner").value;

    var type =
        document.getElementById("propertyType").value;

    var area =
        Number(document.getElementById("area").value);

    var pricePerSqft =
        Number(document.getElementById("pricePerSqft").value);

    var years =
        Number(document.getElementById("years").value);

    if(
        owner == "" ||
        type == "" ||
        area <= 0 ||
        pricePerSqft <= 0 ||
        years < 0
    ){

        document.getElementById("result").innerHTML =
            "Please enter valid data.";

        return;

    }

    var property =
        new Property(
            owner,
            type,
            area,
            pricePerSqft,
            years
        );

    document.getElementById("result").innerHTML =

        "<h3>Property Report</h3>" +

        "Owner: " +
        property.owner + "<br><br>" +

        "Property Type: " +
        property.type + "<br><br>" +

        "Area: " +
        property.area + " sq ft<br><br>" +

        "Price Per Sq Ft: Rs. " +
        property.pricePerSqft + "<br><br>" +

        "Property Age: " +
        property.years + " Years<br><br>" +

        "Current Value: Rs. " +
        property.getPropertyValue().toFixed(2) + "<br><br>" +

        "Estimated Value: Rs. " +
        property.getEstimatedValue().toFixed(2) + "<br><br>" +

        "Agent Commission: Rs. " +
        property.getAgentCommission().toFixed(2) + "<br><br>" +

        "Investment Grade: " +
        property.getInvestmentGrade() + "<br><br>" +

        "Property Status: " +
        property.getPropertyStatus();

}

</script>

</body>
</html>
