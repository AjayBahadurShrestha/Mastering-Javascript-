<!DOCTYPE html>
<html>
<head>
    <title>Hotel Booking System</title>

    <style>

        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 40px;
        }

        .box {
            width: 400px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input, select, button {
            width: 250px;
            padding: 10px;
            margin: 10px;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
        }

    </style>
</head>

<body>

    <div class="box">

        <h2>Hotel Room Booking</h2>

        <select id="room">
            <option value="">Select Room Type</option>
            <option value="standard">Standard Room</option>
            <option value="deluxe">Deluxe Room</option>
            <option value="luxury">Luxury Room</option>
        </select>

        <br>

        <input type="number" id="days" placeholder="Number of days">

        <br>

        <input type="number" id="people" placeholder="Number of people">

        <br>

        <button onclick="calculateBooking()">Book Now</button>

        <div id="result"></div>

    </div>

    <script>

        function calculateBooking() {

            var room = document.getElementById("room").value;
            var days = document.getElementById("days").value;
            var people = document.getElementById("people").value;

            if (room == "" || days == "" || people == "") {

                document.getElementById("result").innerHTML =
                    "Please fill all fields";

                return;
            }

            var roomPrice = 0;

            // Room price conditions
            if (room == "standard") {
                roomPrice = 2000;
            }
            else if (room == "deluxe") {
                roomPrice = 4000;
            }
            else {
                roomPrice = 7000;
            }

            // Room total
            var totalRoomCost = roomPrice * days;

            // Extra people charges
            var extraCharge = 0;

            if (people > 2) {

                var extraPeople = people - 2;

                extraCharge = extraPeople * 500 * days;
            }

            // Final amount
            var finalBill = totalRoomCost + extraCharge;

            document.getElementById("result").innerHTML =

                "Room Cost: Rs. " + totalRoomCost + "<br><br>" +

                "Extra Charges: Rs. " + extraCharge + "<br><br>" +

                "Final Bill: Rs. " + finalBill;

        }

    </script>

</body>
</html>
