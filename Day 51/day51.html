<!DOCTYPE html>
<html>

<head>

    <title>Flight Reservation System</title>

    <style>

        body{
            font-family: Arial;
            background:#eef2f7;
            text-align:center;
        }

        .container{
            width:750px;
            margin:auto;
            margin-top:30px;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input,
        select,
        button{
            width:320px;
            padding:10px;
            margin:10px;
        }

        button{
            background:#0284c7;
            color:white;
            border:none;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            text-align:left;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>✈️ Flight Reservation System</h2>

    <input
        type="text"
        id="passenger"
        placeholder="Passenger Name">

    <br>

    <select id="destination">

        <option value="">
            Select Destination
        </option>

        <option value="Dubai">
            Dubai
        </option>

        <option value="London">
            London
        </option>

        <option value="Tokyo">
            Tokyo
        </option>

    </select>

    <br>

    <select id="seatClass">

        <option value="">
            Select Class
        </option>

        <option value="Economy">
            Economy
        </option>

        <option value="Business">
            Business
        </option>

    </select>

    <br>

    <input
        type="number"
        id="tickets"
        placeholder="Number of Tickets">

    <br>

    <button onclick="bookFlight()">
        Book Flight
    </button>

    <div id="result"></div>

</div>

<script>

class FlightBooking{

    constructor(passenger, destination, seatClass, tickets){

        this.passenger = passenger;
        this.destination = destination;
        this.seatClass = seatClass;
        this.tickets = tickets;

    }

    getTicketPrice(){

        var price = 0;

        if(this.destination == "Dubai"){

            price = 25000;

        }
        else if(this.destination == "London"){

            price = 80000;

        }
        else{

            price = 100000;

        }

        if(this.seatClass == "Business"){

            price = price + 30000;

        }

        return price;

    }

    calculateTotal(){

        return this.getTicketPrice() *
               this.tickets;

    }

}

function bookFlight(){

    var passenger =
        document.getElementById("passenger").value;

    var destination =
        document.getElementById("destination").value;

    var seatClass =
        document.getElementById("seatClass").value;

    var tickets =
        Number(document.getElementById("tickets").value);

    if(
        passenger == "" ||
        destination == "" ||
        seatClass == "" ||
        tickets <= 0
    ){

        document.getElementById("result").innerHTML =
            "Please fill all fields.";

        return;

    }

    var booking =
        new FlightBooking(
            passenger,
            destination,
            seatClass,
            tickets
        );

    var total =
        booking.calculateTotal();

    document.getElementById("result").innerHTML =

        "<h3>Flight Booking Summary</h3>" +

        "Passenger: " +
        booking.passenger + "<br><br>" +

        "Destination: " +
        booking.destination + "<br><br>" +

        "Class: " +
        booking.seatClass + "<br><br>" +

        "Tickets: " +
        booking.tickets + "<br><br>" +

        "Price Per Ticket: Rs. " +
        booking.getTicketPrice() + "<br><br>" +

        "<strong>Total Cost: Rs. " +
        total +
        "</strong>";

}

</script>

</body>

</html>
