<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Grade Calculator</title>
</head>
<body>

  <script>
    // ─── Check Grade ───────────────────────────────────────
    function getGrade(score) {
      if (score >= 90) {
        return "A";
      } else if (score >= 80) {
        return "B";
      } else if (score >= 70) {
        return "C";
      } else if (score >= 60) {
        return "D";
      } else {
        return "F";
      }
    }

    // ─── Check Pass or Fail ────────────────────────────────
    function isPass(score) {
      if (score >= 60) {
        return "Pass";
      } else {
        return "Fail";
      }
    }

    // ─── Calculate Average ─────────────────────────────────
    function getAverage(scores) {
      let total = 0;

      for (let i = 0; i < scores.length; i++) {
        total = total + scores[i];
      }

      return total / scores.length;
    }

    // ─── Print Result ──────────────────────────────────────
    function printResult(name, scores) {
      let average = getAverage(scores);
      let grade   = getGrade(average);
      let status  = isPass(average);

      console.log("─────────────────────────");
      console.log("Student : " + name);
      console.log("Scores  : " + scores.join(", "));
      console.log("Average : " + average);
      console.log("Grade   : " + grade);
      console.log("Status  : " + status);
      console.log("─────────────────────────");
    }

    // ─── Run ───────────────────────────────────────────────
    printResult("Alice", [95, 88, 92]);
    printResult("Bob",   [70, 65, 60]);
    printResult("Charlie", [40, 55, 50]);
  </script>

</body>
</html>
