  <title>variable-exercise</title>

<body>
  <script>
    let name='Ajay';
    console.log(`My name is: ${name}`);
    
    let cost=5+(2*3)+9
    console.log(`Cost of food: $${cost}`)

    tax=cost*0.1;

    let totalCost= tax+cost;
    console.log(`Total cost: $${totalCost}`)

    
  </script>
