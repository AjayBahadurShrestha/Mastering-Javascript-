<!DOCTYPE html>
<html>
<head>

    <title>University Admission System</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
            text-align:center;
        }

        .container{
            width:850px;
            margin:auto;
            margin-top:30px;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input,
        select,
        button{
            width:350px;
            padding:10px;
            margin:10px;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            text-align:left;
            font-size:17px;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>🎓 University Admission System</h2>

    <input
        type="text"
        id="studentName"
        placeholder="Student Name">

    <br>

    <input
        type="number"
        id="gpa"
        placeholder="High School GPA (0 - 4)">

    <br>

    <input
        type="number"
        id="exam"
        placeholder="Entrance Exam Score (0 - 100)">

    <br>

    <select id="program">

        <option value="">
            Select Program
        </option>

        <option value="Computer Science">
            Computer Science
        </option>

        <option value="Engineering">
            Engineering
        </option>

        <option value="Business">
            Business
        </option>

    </select>

    <br>

    <button onclick="processAdmission()">
        Check Admission
    </button>

    <div id="result"></div>

</div>

<script>

class Applicant{

    constructor(name, gpa, exam, program){

        this.name = name;
        this.gpa = gpa;
        this.exam = exam;
        this.program = program;

    }

    calculateMeritScore(){

        return (this.gpa * 25) +
               (this.exam * 0.75);

    }

    getAdmissionStatus(){

        if(this.calculateMeritScore() >= 140){

            return "Accepted";

        }
        else if(this.calculateMeritScore() >= 110){

            return "Waiting List";

        }
        else{

            return "Rejected";

        }

    }

    getScholarship(){

        var merit =
            this.calculateMeritScore();

        if(merit >= 160){

            return "100% Scholarship";

        }
        else if(merit >= 145){

            return "50% Scholarship";

        }
        else if(merit >= 130){

            return "25% Scholarship";

        }
        else{

            return "No Scholarship";

        }

    }

    getProgramFee(){

        if(this.program == "Computer Science"){

            return 300000;

        }
        else if(this.program == "Engineering"){

            return 350000;

        }
        else{

            return 250000;

        }

    }

    getFinalFee(){

        var fee =
            this.getProgramFee();

        var scholarship =
            this.getScholarship();

        if(scholarship == "100% Scholarship"){

            return 0;

        }
        else if(scholarship == "50% Scholarship"){

            return fee * 0.5;

        }
        else if(scholarship == "25% Scholarship"){

            return fee * 0.75;

        }

        return fee;

    }

}

function processAdmission(){

    var name =
        document.getElementById("studentName").value;

    var gpa =
        Number(document.getElementById("gpa").value);

    var exam =
        Number(document.getElementById("exam").value);

    var program =
        document.getElementById("program").value;

    if(
        name == "" ||
        gpa < 0 ||
        gpa > 4 ||
        exam < 0 ||
        exam > 100 ||
        program == ""
    ){

        document.getElementById("result").innerHTML =
            "Please enter valid information.";

        return;

    }

    var applicant =
        new Applicant(
            name,
            gpa,
            exam,
            program
        );

    document.getElementById("result").innerHTML =

        "<h3>Admission Report</h3>" +

        "Student: " +
        applicant.name + "<br><br>" +

        "Program: " +
        applicant.program + "<br><br>" +

        "GPA: " +
        applicant.gpa + "<br><br>" +

        "Exam Score: " +
        applicant.exam + "<br><br>" +

        "Merit Score: " +
        applicant.calculateMeritScore().toFixed(2) + "<br><br>" +

        "Admission Status: " +
        applicant.getAdmissionStatus() + "<br><br>" +

        "Scholarship: " +
        applicant.getScholarship() + "<br><br>" +

        "Program Fee: Rs. " +
        applicant.getProgramFee() + "<br><br>" +

        "<strong>Final Payable Fee: Rs. " +
        applicant.getFinalFee().toFixed(2) +
        "</strong>";

}

</script>

</body>
</html>
