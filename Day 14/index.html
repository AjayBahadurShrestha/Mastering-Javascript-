<!DOCTYPE html>
<html>
<head>
    <title>Bill Splitter</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input, button {
            padding: 10px;
            margin: 10px;
        }

        #result {
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h2>Bill Splitter</h2>

    <input type="number" id="total" placeholder="Total amount">
    <br>

    <input type="number" id="people" placeholder="Number of people">
    <br>

    <button onclick="splitBill()">Split</button>

    <p id="result"></p>

    <script>

        function splitBill() {
            var total = document.getElementById("total").value;
            var people = document.getElementById("people").value;

            if (total == "" || people == "") {
                document.getElementById("result").innerHTML = "Please fill all fields";
                return;
            }

            if (people <= 0) {
                document.getElementById("result").innerHTML = "Number of people must be greater than 0";
                return;
            }

            var amount = total / people;

            var message = "Each person should pay: " + amount;

            document.getElementById("result").innerHTML = message;
        }

    </script>

</body>
</html>
