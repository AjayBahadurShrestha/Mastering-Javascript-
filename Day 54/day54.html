<!DOCTYPE html>
<html>

<head>

    <title>Gym Membership System</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f5f5;
            text-align:center;
        }

        .container{
            width:700px;
            margin:auto;
            margin-top:30px;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input,
        select,
        button{
            width:320px;
            padding:10px;
            margin:10px;
        }

        button{
            background:#dc2626;
            color:white;
            border:none;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            text-align:left;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>🏋️ Gym Membership System</h2>

    <input
        type="text"
        id="memberName"
        placeholder="Member Name">

    <br>

    <input
        type="number"
        id="age"
        placeholder="Age">

    <br>

    <select id="plan">

        <option value="">
            Select Plan
        </option>

        <option value="Basic">
            Basic
        </option>

        <option value="Premium">
            Premium
        </option>

        <option value="VIP">
            VIP
        </option>

    </select>

    <br>

    <select id="trainer">

        <option value="">
            Personal Trainer
        </option>

        <option value="Yes">
            Yes
        </option>

        <option value="No">
            No
        </option>

    </select>

    <br>

    <button onclick="registerMember()">
        Register Member
    </button>

    <div id="result"></div>

</div>

<script>

class GymMember{

    constructor(name, age, plan){

        this.name = name;
        this.age = age;
        this.plan = plan;

    }

    getPlanPrice(){

        if(this.plan == "Basic"){

            return 2000;

        }
        else if(this.plan == "Premium"){

            return 5000;

        }
        else{

            return 8000;

        }

    }

    getFitnessCategory(){

        if(this.age < 18){

            return "Junior Member";

        }
        else if(this.age <= 40){

            return "Adult Member";

        }
        else{

            return "Senior Member";

        }

    }

}

function registerMember(){

    var name =
        document.getElementById("memberName").value;

    var age =
        Number(document.getElementById("age").value);

    var plan =
        document.getElementById("plan").value;

    var trainer =
        document.getElementById("trainer").value;

    if(
        name == "" ||
        age <= 0 ||
        plan == "" ||
        trainer == ""
    ){

        document.getElementById("result").innerHTML =
            "Please fill all fields";

        return;

    }

    var member =
        new GymMember(
            name,
            age,
            plan
        );

    var membershipFee =
        member.getPlanPrice();

    var trainerFee = 0;

    if(trainer == "Yes"){

        trainerFee = 3000;

    }

    var totalFee =
        membershipFee + trainerFee;

    document.getElementById("result").innerHTML =

        "<h3>Membership Report</h3>" +

        "Member Name: " +
        member.name + "<br><br>" +

        "Age: " +
        member.age + "<br><br>" +

        "Plan: " +
        member.plan + "<br><br>" +

        "Category: " +
        member.getFitnessCategory() + "<br><br>" +

        "Membership Fee: Rs. " +
        membershipFee + "<br><br>" +

        "Trainer Fee: Rs. " +
        trainerFee + "<br><br>" +

        "<strong>Total Fee: Rs. " +
        totalFee +
        "</strong>";

}

</script>

</body>

</html>
