<!DOCTYPE html>
<html>
<head>
    <title>Zombie Survival Base</title>

    <style>

        body {
            font-family: Arial;
            background-color: #101010;
            color: white;
            text-align: center;
            margin-top: 20px;
        }

        .box {
            width: 760px;
            margin: auto;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 20px green;
        }

        input, select, button {
            width: 380px;
            padding: 12px;
            margin: 10px;
            font-size: 15px;
            border-radius: 8px;
            border: none;
        }

        button {
            background-color: green;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        #result {
            margin-top: 20px;
            text-align: left;
            font-size: 18px;
        }

        .safe {
            color: lightgreen;
        }

        .warning {
            color: orange;
        }

        .danger {
            color: red;
        }

    </style>
</head>

<body>

    <div class="box">

        <h2>🧟 Zombie Survival Base Management</h2>

        <input type="text"
            id="base"
            placeholder="Base Name">

        <br>

        <input type="number"
            id="survivors"
            placeholder="Number of Survivors">

        <br>

        <input type="number"
            id="food"
            placeholder="Food Supply Units">

        <br>

        <select id="defense">

            <option value="">
                Select Defense Level
            </option>

            <option value="wood">
                Wooden Defense
            </option>

            <option value="steel">
                Steel Defense
            </option>

            <option value="military">
                Military Defense
            </option>

        </select>

        <br>

        <input type="number"
            id="zombies"
            placeholder="Nearby Zombie Count">

        <br>

        <select id="power">

            <option value="">
                Power System Status
            </option>

            <option value="on">
                ON
            </option>

            <option value="off">
                OFF
            </option>

        </select>

        <br>

        <button onclick="analyzeBase()">
            Analyze Survival Base
        </button>

        <div id="result"></div>

    </div>

    <script>

        function analyzeBase() {

            var base =
                document.getElementById("base").value;

            var survivors =
                Number(document.getElementById("survivors").value);

            var food =
                Number(document.getElementById("food").value);

            var defense =
                document.getElementById("defense").value;

            var zombies =
                Number(document.getElementById("zombies").value);

            var power =
                document.getElementById("power").value;

            // Validation
            if (base == "" ||
                survivors <= 0 ||
                food < 0 ||
                defense == "" ||
                zombies < 0 ||
                power == "") {

                document.getElementById("result").innerHTML =
                    "Please enter valid survival data";

                return;
            }

            var defensePoints = 0;

            // Defense system
            if (defense == "wood") {

                defensePoints = 20;

            }
            else if (defense == "steel") {

                defensePoints = 60;

            }
            else {

                defensePoints = 120;

            }

            // Danger score
            var dangerScore =
                zombies - defensePoints;

            // Power issue
            if (power == "off") {

                dangerScore =
                    dangerScore + 50;

            }

            // Food analysis
            var foodStatus = "";
            var foodClass = "";

            if (food < survivors * 2) {

                foodStatus = "Food Shortage";
                foodClass = "danger";

                dangerScore =
                    dangerScore + 40;

            }
            else {

                foodStatus = "Food Supply Stable";
                foodClass = "safe";

            }

            // Threat level
            var threat = "";
            var threatClass = "";

            if (dangerScore >= 150) {

                threat = "EXTREME ZOMBIE THREAT";
                threatClass = "danger";

            }
            else if (dangerScore >= 70) {

                threat = "HIGH ALERT";
                threatClass = "warning";

            }
            else {

                threat = "BASE SECURE";
                threatClass = "safe";

            }

            // Survival chance
            var survivalChance = 0;

            if (dangerScore >= 150) {

                survivalChance = 15;

            }
            else if (dangerScore >= 70) {

                survivalChance = 50;

            }
            else {

                survivalChance = 90;

            }

            // Evacuation system
            var evacuation = "";

            if (dangerScore >= 180) {

                evacuation =
                    "Immediate Evacuation Required";

            }
            else {

                evacuation =
                    "No Evacuation Needed";

            }

            // Display result
            document.getElementById("result").innerHTML =

                "<h3>Survival Base Report</h3>" +

                "Base Name: " +
                base + "<br><br>" +

                "Survivors: " +
                survivors + "<br><br>" +

                "Zombie Count: " +
                zombies + "<br><br>" +

                "Defense System: " +
                defense + "<br><br>" +

                "<span class='" + foodClass + "'>" +
                foodStatus +
                "</span><br><br>" +

                "<span class='" + threatClass + "'>" +
                threat +
                "</span><br><br>" +

                "Power Status: " +
                power + "<br><br>" +

                "Danger Score: " +
                dangerScore + "<br><br>" +

                "Survival Chance: " +
                survivalChance + "%<br><br>" +

                "Evacuation Status: " +
                evacuation;

        }

    </script>

</body>
</html>
