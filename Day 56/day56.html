<!DOCTYPE html>
<html>
<head>
    <title>Vehicle Service Center</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            text-align:center;
        }

        .container{
            width:800px;
            margin:auto;
            margin-top:30px;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input,
        select,
        button{
            width:350px;
            padding:10px;
            margin:10px;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            text-align:left;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>🚗 Vehicle Service Center Management System</h2>

    <input
        type="text"
        id="customer"
        placeholder="Customer Name">

    <br>

    <input
        type="text"
        id="vehicle"
        placeholder="Vehicle Number">

    <br>

    <select id="service">

        <option value="">
            Select Service Type
        </option>

        <option value="Basic">
            Basic Service
        </option>

        <option value="Full">
            Full Service
        </option>

        <option value="Premium">
            Premium Service
        </option>

    </select>

    <br>

    <input
        type="number"
        id="parts"
        placeholder="Parts Cost">

    <br>

    <input
        type="number"
        id="labor"
        placeholder="Labor Cost">

    <br>

    <button onclick="generateBill()">
        Generate Invoice
    </button>

    <div id="result"></div>

</div>

<script>

class ServiceCenter{

    constructor(customer, vehicle, service, parts, labor){

        this.customer = customer;
        this.vehicle = vehicle;
        this.service = service;
        this.parts = parts;
        this.labor = labor;

    }

    getServiceCharge(){

        if(this.service == "Basic"){

            return 2000;

        }
        else if(this.service == "Full"){

            return 5000;

        }
        else{

            return 8000;

        }

    }

    calculateSubtotal(){

        return this.parts +
               this.labor +
               this.getServiceCharge();

    }

    calculateTax(){

        return this.calculateSubtotal() * 0.13;

    }

    calculateTotal(){

        return this.calculateSubtotal() +
               this.calculateTax();

    }

    getServiceStatus(){

        if(this.calculateTotal() > 15000){

            return "Premium Customer";

        }
        else{

            return "Regular Customer";

        }

    }

}

function generateBill(){

    var customer =
        document.getElementById("customer").value;

    var vehicle =
        document.getElementById("vehicle").value;

    var service =
        document.getElementById("service").value;

    var parts =
        Number(document.getElementById("parts").value);

    var labor =
        Number(document.getElementById("labor").value);

    if(
        customer == "" ||
        vehicle == "" ||
        service == ""
    ){

        document.getElementById("result").innerHTML =
            "Please fill all fields";

        return;

    }

    var bill =
        new ServiceCenter(
            customer,
            vehicle,
            service,
            parts,
            labor
        );

    document.getElementById("result").innerHTML =

        "<h3>Service Invoice</h3>" +

        "Customer Name: " +
        bill.customer + "<br><br>" +

        "Vehicle Number: " +
        bill.vehicle + "<br><br>" +

        "Service Type: " +
        bill.service + "<br><br>" +

        "Service Charge: Rs. " +
        bill.getServiceCharge() + "<br><br>" +

        "Parts Cost: Rs. " +
        bill.parts + "<br><br>" +

        "Labor Cost: Rs. " +
        bill.labor + "<br><br>" +

        "Subtotal: Rs. " +
        bill.calculateSubtotal().toFixed(2) + "<br><br>" +

        "Tax (13%): Rs. " +
        bill.calculateTax().toFixed(2) + "<br><br>" +

        "Customer Type: " +
        bill.getServiceStatus() + "<br><br>" +

        "<strong>Total Amount: Rs. " +
        bill.calculateTotal().toFixed(2) +
        "</strong>";

}

</script>

</body>
</html>
