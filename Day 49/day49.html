<!DOCTYPE html>
<html>

<head>

    <title>ATM Banking System</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f9;
            text-align:center;
        }

        .container{
            width:700px;
            margin:auto;
            margin-top:30px;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input,
        select,
        button{
            width:320px;
            padding:10px;
            margin:10px;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            text-align:left;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>🏦 ATM Banking System</h2>

    <input
        type="text"
        id="name"
        placeholder="Account Holder">

    <br>

    <input
        type="number"
        id="amount"
        placeholder="Enter Amount">

    <br>

    <select id="action">

        <option value="">
            Select Action
        </option>

        <option value="deposit">
            Deposit
        </option>

        <option value="withdraw">
            Withdraw
        </option>

    </select>

    <br>

    <button onclick="performTransaction()">
        Submit
    </button>

    <div id="result"></div>

</div>

<script>

class BankAccount{

    constructor(name){

        this.name = name;
        this.balance = 10000;

    }

    deposit(amount){

        this.balance =
            this.balance + amount;

    }

    withdraw(amount){

        if(amount <= this.balance){

            this.balance =
                this.balance - amount;

            return "Withdrawal Successful";

        }
        else{

            return "Insufficient Balance";

        }

    }

}

var account = null;

function performTransaction(){

    var name =
        document.getElementById("name").value;

    var amount =
        Number(document.getElementById("amount").value);

    var action =
        document.getElementById("action").value;

    if(
        name == "" ||
        amount <= 0 ||
        action == ""
    ){

        document.getElementById("result").innerHTML =
            "Please fill all fields";

        return;

    }

    if(account == null){

        account =
            new BankAccount(name);

    }

    var message = "";

    if(action == "deposit"){

        account.deposit(amount);

        message =
            "Deposit Successful";

    }
    else{

        message =
            account.withdraw(amount);

    }

    document.getElementById("result").innerHTML =

        "<h3>Account Report</h3>" +

        "Account Holder: " +
        account.name + "<br><br>" +

        "Transaction Status: " +
        message + "<br><br>" +

        "<strong>Current Balance: Rs. " +
        account.balance +
        "</strong>";

}

</script>

</body>

</html>
