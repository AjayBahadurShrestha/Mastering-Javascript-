<!DOCTYPE html>
<html>
<head>
    <title>Student Result System</title>

    <style>

        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
            margin-top: 40px;
        }

        .box {
            width: 420px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input, button {
            width: 250px;
            padding: 10px;
            margin: 10px;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
        }

    </style>
</head>

<body>

    <div class="box">

        <h2>Student Result System</h2>

        <input type="number" id="math" placeholder="Math Marks">
        <br>

        <input type="number" id="science" placeholder="Science Marks">
        <br>

        <input type="number" id="english" placeholder="English Marks">
        <br>

        <button onclick="calculateResult()">Calculate Result</button>

        <div id="result"></div>

    </div>

    <script>

        function calculateResult() {

            var math =
                Number(document.getElementById("math").value);

            var science =
                Number(document.getElementById("science").value);

            var english =
                Number(document.getElementById("english").value);

            // Check empty fields
            if (math == "" || science == "" || english == "") {

                document.getElementById("result").innerHTML =
                    "Please fill all fields";

                return;
            }

            // Total marks
            var total = math + science + english;

            // Percentage
            var percentage = total / 3;

            var grade = "";

            var status = "";

            // Fail condition
            if (math < 35 || science < 35 || english < 35) {

                grade = "F";
                status = "Fail";

            }
            else {

                // Grade system
                if (percentage >= 80) {
                    grade = "A";
                }
                else if (percentage >= 60) {
                    grade = "B";
                }
                else if (percentage >= 40) {
                    grade = "C";
                }
                else {
                    grade = "F";
                }

                status = "Pass";
            }

            // Show result
            document.getElementById("result").innerHTML =

                "Total Marks: " + total + "<br><br>" +

                "Percentage: " + percentage.toFixed(2) + "%<br><br>" +

                "Grade: " + grade + "<br><br>" +

                "Status: " + status;

        }

    </script>

</body>
</html>
